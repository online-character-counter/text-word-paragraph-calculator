<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="bIH59276gRWkn8XUL3696FWDw2ktQok8y_VJ7c2qo4A" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Professional Text Matrix</title>
<style>
body{font-family:system-ui,sans-serif;background:#0f172a;margin:0;padding:24px;color:#fff}
.wrap{max-width:1000px;margin:auto;background:#1e293b;border-radius:16px;padding:24px}
textarea{width:100%;min-height:220px;background:#111827;color:#fff;border:1px solid #334155;border-radius:12px;padding:14px;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:18px}
.card{background:#111827;padding:14px;border-radius:10px;text-align:center}
.value{font-size:1.6rem;font-weight:bold}
label{display:block;margin-bottom:8px}
button{margin-top:12px;margin-right:8px;padding:8px 14px}
</style>
</head>
<body>
<div class="wrap">
<h2>📊 Professional Text Matrix</h2>
<label for="t">Enter text</label>
<textarea id="t" aria-label="Text input"></textarea><br>
<button id="copy">Copy</button><button id="clear">Clear</button>
<div class="grid" aria-live="polite">
<div class="card"><div class="value" id="w">0</div>Words</div>
<div class="card"><div class="value" id="c">0</div>Characters</div>
<div class="card"><div class="value" id="s">0</div>Sentences</div>
<div class="card"><div class="value" id="p">0</div>Paragraphs</div>
<div class="card"><div class="value" id="r">0 sec</div>Read Time</div>
</div>
</div>
<script>
const t=document.getElementById('t');
const ids={w,wEl:document.getElementById('w')};
const out={w:document.getElementById('w'),c:document.getElementById('c'),s:document.getElementById('s'),p:document.getElementById('p'),r:document.getElementById('r')};
const g='Segmenter'in Intl?new Intl.Segmenter(undefined,{granularity:'grapheme'}):null;
const wd='Segmenter'in Intl?new Intl.Segmenter(undefined,{granularity:'word'}):null;
function upd(){
const txt=t.value;
const chars=g?[...g.segment(txt)].length:[...txt].length;
out.c.textContent=chars;
if(!txt.trim()){for(let k of['w','s','p'])out[k].textContent=0;out.r.textContent='0 sec';return;}
const words=wd?[...wd.segment(txt)].filter(x=>x.isWordLike).length:(txt.match(/\S+/g)||[]).length;
out.w.textContent=words;
out.s.textContent=(txt.match(/[^.!?]+([.!?]+|$)/g)||[]).filter(x=>x.trim()).length;
out.p.textContent=txt.trim().split(/(?:\r?\n){2,}/).filter(Boolean).length;
let sec=Math.max(1,Math.round(words/200*60));
out.r.textContent=sec<60?sec+' sec':Math.floor(sec/60)+' min';
}
let timer; t.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(upd,60)});
document.getElementById('clear').onclick=()=>{t.value='';upd();t.focus();}
document.getElementById('copy').onclick=async()=>{try{await navigator.clipboard.writeText(t.value);alert('Copied');}catch(e){alert('Copy failed');}};
upd();
</script>
<p>Tool created by <a href="https://www.pinoydailypulse.com/p/free-word-and-character-counter-with.html">Pinoy Daily Pulse</a></p>
</body></html>
